<script>
// Script de respaldo para producción - ejecuta solo si discord-loading.js falla
(function() {
    'use strict';
    
    // Esperar un poco para ver si el script principal funciona
    setTimeout(function() {
        // Verificar si ya hay una animación de progreso activa
        const progressBar = document.querySelector('.bg-blue-500.h-2');
        const counter = document.getElementById('ld6-counter');
        
        if (progressBar && progressBar.style.width === '0%') {
            console.log('Fallback script activated for index6.html');
            
            // Animación manual de 5 segundos
            let width = 0;
            const interval = setInterval(function() {
                width += 2;
                if (width >= 100) {
                    width = 100;
                    clearInterval(interval);
                    
                    // Redirección después de completar
                    setTimeout(function() {
                        console.log('Fallback redirect to index7.html');
                        window.location.href = 'index7.html';
                    }, 500);
                }
                progressBar.style.width = width + '%';
            }, 100); // 100ms * 50 = 5 segundos
        }
        
        // Contador regresivo de respaldo
        if (counter && counter.textContent === '10s') {
            let seconds = 5;
            counter.textContent = seconds + 's';
            
            const countInterval = setInterval(function() {
                seconds--;
                counter.textContent = seconds + 's';
                if (seconds <= 0) clearInterval(countInterval);
            }, 1000);
        }
    }, 1000); // Esperar 1 segundo para verificar
})();
</script>
